version: '3.8'

services:
  transllama:
    build: .
    container_name: transllama
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # 模型文件目录（必须提前下载模型到此目录）
      - ./storage/models:/app/storage/models:ro
      # 模型配置（可选：挂载自定义配置覆盖镜像内默认值）
      - ./models.yaml:/app/models.yaml:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
